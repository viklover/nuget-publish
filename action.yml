name: NuGet Publisher
author: Mihail Vorobyev (@viklover)
description: Build, Pack & Publish a NuGet package

inputs:
  DOTNET_VERSION:
    description: Version of dotnet 
    required: true
  PROJECT_FILE_PATH:
    description: Filepath of the project to be packaged, relative to root of repository
    required: true
  NUGET_USER:
    description: Username for NuGet login (OIDC → temp API key)
    required: true
  GITHUB_TOKEN:
    description: GitHub token for GitHub Packages push (pass secrets.GITHUB_TOKEN)
    required: true
runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Extract version from tag
      shell: bash
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.DOTNET_VERSION }}

    - name: Restore dependencies
      shell: bash
      run: dotnet restore ${{ inputs.PROJECT_FILE_PATH }}

    - name: Build
      shell: bash
      run: dotnet build ${{ inputs.PROJECT_FILE_PATH }} -c Release --no-restore

    - name: Pack
      shell: bash
      run: dotnet pack ${{ inputs.PROJECT_FILE_PATH }} -c Release --no-build -o packages /p:Version=${{ env.VERSION }}

    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@v1
      id: login
      with:
        user: ${{ inputs.NUGET_USER }}

    - name: NuGet push
      shell: bash
      run: dotnet nuget push packages/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

    - name: Github Packages push
      shell: bash
      run: dotnet nuget push packages/*.nupkg --api-key ${{ inputs.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/viklover/index.json --skip-duplicate

branding:
    icon: package
    color: blue